<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ILERA AFRICA — Maquette Modulaire</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- CSS Modulaire -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        /* Loader styles */
        #app-loader {
            position: fixed; inset: 0; background: #0F3F54; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #27AE60; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Squelette d'attente -->
    <div id="app-loader">
        <div class="spinner"></div>
        <div>Chargement des modules...</div>
    </div>

    <!-- DEVICE SWITCHER -->
    <div class="device-switcher">
        <button class="switch-btn active" id="btn-mobile" onclick="setDevice('mobile')">📱 Mobile</button>
        <button class="switch-btn" id="btn-web" onclick="setDevice('web')">💻 Web</button>
    </div>

    <!-- VIEWPORT -->
    <div class="viewport" id="mainViewport">
        <!-- MOBILE FRAME -->
        <div class="mobile-frame" id="mobileFrame">
            <!-- Les écrans mobiles seront injectés ici -->
            <div id="sideMenuOverlay" style="position:absolute;inset:0;background:rgba(0,0,0,0.5);z-index:900;display:none;opacity:0;transition:opacity 0.3s;" onclick="closeDrawer()"></div>
        </div>

        <!-- WEB FRAME — point d'entrée : vitrine (wscreen0) → login → dashboard -->
        <div class="web-frame" id="webFrame">
            <div class="web-browser-bar">
                <div class="browser-dot red"></div>
                <div class="browser-dot yellow"></div>
                <div class="browser-dot green"></div>
                <!-- Bouton Home → retour à la vitrine -->
                <button
                    id="web-home-btn"
                    onclick="goToWebScreen(0)"
                    title="Accueil vitrine"
                    style="background:rgba(22,163,74,0.18);border:1px solid rgba(110,231,183,0.35);color:#6EE7B7;border-radius:6px;padding:2px 10px;font-size:11px;font-weight:700;cursor:pointer;margin-right:4px;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;">
                    🏠 Vitrine
                </button>
                <div class="browser-url" id="webBrowserUrl">🔒 ilera.africa</div>
                <!-- Boutons responsive preview -->
                <div class="vitrine-bar-actions">
                    <button class="vitrine-size-btn active" id="btn-size-desktop" onclick="setWebSize('desktop')" title="Desktop">🖥</button>
                    <button class="vitrine-size-btn" id="btn-size-tablet" onclick="setWebSize('tablet')" title="Tablette">📱</button>
                    <button class="vitrine-size-btn" id="btn-size-mobile" onclick="setWebSize('mobile')" title="Mobile">📲</button>
                </div>
            </div>
            <div class="browser-content" id="browserContent">
                <!-- wscreen0 (vitrine iframe) + tous les écrans web injectés ici -->
            </div>
        </div>
    </div>

    <!-- Overlays globaux -->

    <div id="toast" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1A2332;color:#fff;padding:12px 24px;border-radius:50px;font-size:13px;font-weight:700;z-index:10001;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.3);"></div>
    <div id="screen-picker"></div>
    <button id="screen-picker-toggle" onclick="toggleScreenPicker()">📺 <span id="sp-current">📱1</span></button>

    <!-- Fragments de contenu (chargement local compatible) -->
    <script src="screens/vitrine.js"></script>
    <script src="screens/shared.js"></script>
    <script src="screens/patient.js"></script>
    <script src="screens/pharmacien.js"></script>
    <script src="screens/medecin.js"></script>
    <script src="screens/livreur.js"></script>
    <script src="screens/admin.js"></script>
    <script src="screens/navigation.js"></script>

    <!-- Scripts Core -->
    <script src="assets/js/core.js"></script>
    
    <script>
        /**
         * CHARGEUR DE FRAGMENTS (Optimisé pour exécution locale)
         */
        function initApp() {
            const loader = document.getElementById('app-loader');
            const mobileFrame = document.getElementById('mobileFrame');
            const browserContent = document.getElementById('browserContent');
            
            // Liste des modules à injecter (vitrine en premier = wscreen0)
            const fragments = ['vitrine', 'shared', 'patient', 'pharmacien', 'medecin', 'livreur', 'admin', 'navigation'];

            
            console.log("Démarrage de l'injection des fragments...");
            
            fragments.forEach(name => {
                const html = (window.FRAGMENTS && window.FRAGMENTS[name]) || '';
                if (!html) {
                    console.warn(`Fragment [${name}] non trouvé ou vide.`);
                    return;
                }
                
                const temp = document.createElement('div');
                temp.innerHTML = html;
                
                // 1. Répartition des écrans dans les bons conteneurs
                const mobileScreens = temp.querySelectorAll('.screen');
                mobileScreens.forEach(s => mobileFrame.appendChild(s));
                
                const webScreens = temp.querySelectorAll('.web-screen');
                webScreens.forEach(s => browserContent.appendChild(s));

                // 2. Injection des autres composants globaux (drawers, modaux, overlays)
                // On injecte tout ce qui reste (ex: sideMenuDrawer) directement dans le mobileFrame 
                // pour qu'ils soient contraints par le cadre du téléphone
                [...temp.children].forEach(child => {
                    if (!child.classList.contains('screen') && !child.classList.contains('web-screen')) {
                        mobileFrame.appendChild(child);
                    }
                });
                
                console.log(`Fragment [${name}] injecté.`);
            });

            // Initialisation de la logique UI définie dans core.js
            if (window.buildScreenPicker) buildScreenPicker();
            if (window.buildFlowNav) buildFlowNav();
            
            // Retrait de l'écran de chargement
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }

            // Affichage de l'écran d'accueil (Mobile écran 1)
            if (window.switchTo) switchTo('mobile');
            if (window.goToScreen) goToScreen(1);
            
            setTimeout(() => {
                if (window.showToast) showToast('✅ Maquette chargée avec succès !');
            }, 800);
        }

        // Lancement dès que le DOM est prêt
        document.addEventListener('DOMContentLoaded', initApp);
    </script>

</body>
</html>
